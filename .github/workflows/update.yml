name: 🔄 Auto-Update Channels

on:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:        # allow manual trigger from GitHub UI
  push:
    branches: [main]
    paths:
      - "scrapers/**"
      - "utils/**"
      - "main.py"
      - "requirements.txt"

jobs:
  scrape:
    name: Scrape & Update
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write       # needed to push output files back

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Python setup ──────────────────────────────────────────────────────
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # ── Scrape ────────────────────────────────────────────────────────────
      - name: 🕷️ Run scraper (single cycle)
        run: python main.py --once
        env:
          PYTHONUNBUFFERED: "1"

      # ── Commit results ────────────────────────────────────────────────────
      - name: 📊 Generate stats badge
        run: python scripts/gen_badge.py

      - name: 💾 Commit & push updated channels
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            🤖 Auto-update channels — ${{ github.run_id }}

            $(python scripts/commit_summary.py 2>/dev/null || echo "")
          file_pattern: "output/* logs/*"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
